name: Naver News to Slack

on:
  workflow_dispatch:
  schedule:
    - cron: "5 0 * * *"

jobs:
  send-news:
    runs-on: ubuntu-latest

    steps:
      - name: Send Naver News
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          NEWS_QUERY: 게임
        run: |
          python <<'PY'
          import os
          import json
          import html
          import urllib.parse
          import urllib.request

          NAVER_CLIENT_ID = os.environ["NAVER_CLIENT_ID"]
          NAVER_CLIENT_SECRET = os.environ["NAVER_CLIENT_SECRET"]
          SLACK_BOT_TOKEN = os.environ["SLACK_BOT_TOKEN"]
          SLACK_CHANNEL_ID = os.environ["SLACK_CHANNEL_ID"]
          NEWS_QUERY = os.environ.get("NEWS_QUERY", "게임")

          def request_json(url, headers=None):
              req = urllib.request.Request(url, headers=headers or {})
              with urllib.request.urlopen(req) as resp:
                  return json.loads(resp.read().decode("utf-8"))

          query = urllib.parse.quote(NEWS_QUERY)
          url = f"https://openapi.naver.com/v1/search/news.json?query={query}&display=5&sort=date"

          headers = {
              "X-Naver-Client-Id": NAVER_CLIENT_ID,
              "X-Naver-Client-Secret": NAVER_CLIENT_SECRET,
          }

          data = request_json(url, headers)
          items = data.get("items", [])

          if not items:
              text = f"📭 '{NEWS_QUERY}' 뉴스 없음"
          else:
              lines = [f"📰 *{NEWS_QUERY} 뉴스*", ""]
              for i, item in enumerate(items, 1):
                  title = html.unescape(item["title"]).replace("<b>", "").replace("</b>", "")
                  link = item["originallink"] or item["link"]
                  lines.append(f"{i}. {title}")
                  lines.append(link)
                  lines.append("")
              text = "\n".join(lines)

          req = urllib.request.Request(
              "https://slack.com/api/chat.postMessage",
              data=json.dumps({
                  "channel": SLACK_CHANNEL_ID,
                  "text": text
              }).encode("utf-8"),
              headers={
                  "Authorization": f"Bearer {SLACK_BOT_TOKEN}",
                  "Content-Type": "application/json"
              }
          )

          res = urllib.request.urlopen(req)
          result = json.loads(res.read().decode("utf-8"))

          if not result.get("ok"):
              raise Exception(result)

          print("완료!")
          PY
