name: Naver News to Slack

on:
  workflow_dispatch:
  schedule:
    - cron: "5 0 * * *"

jobs:
  send-news:
    runs-on: ubuntu-latest

    steps:
      - name: Send categorized Naver News to Slack
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: |
          python <<'PY'
          import os
          import re
          import json
          import html
          import urllib.parse
          import urllib.request
          from datetime import datetime, timedelta, timezone

          NAVER_CLIENT_ID = os.environ["NAVER_CLIENT_ID"]
          NAVER_CLIENT_SECRET = os.environ["NAVER_CLIENT_SECRET"]
          SLACK_BOT_TOKEN = os.environ["SLACK_BOT_TOKEN"]
          SLACK_CHANNEL_ID = os.environ["SLACK_CHANNEL_ID"]

          # 한국 시간
          KST = timezone(timedelta(hours=9))
          today_text = datetime.now(KST).strftime("%Y-%m-%d")

          # 카테고리별 검색어
          CATEGORIES = [
              {
                  "title": "게임회사 동향",
                  "emoji": "🎮",
                  "queries": [
                      "게임업계 동향",
                      "게임사 실적 OR 게임사 투자 OR 게임사 전략",
                      "상장 게임사 OR 경쟁 게임사",
                      "게임산업 정책 OR 게임 규제"
                  ]
              },
              {
                  "title": "노동정책",
                  "emoji": "⚖️",
                  "queries": [
                      "노동정책 OR 노동법 개정 OR 고용노동부",
                      "근무제도 OR 유연근무 OR 주52시간",
                      "노동 분쟁 OR 노동 판례 OR 부당해고",
                      "게임업계 노동 OR IT업계 노동 OR 포괄임금"
                  ]
              }
          ]

          def request_json(url, headers=None):
              req = urllib.request.Request(url, headers=headers or {})
              with urllib.request.urlopen(req) as resp:
                  return json.loads(resp.read().decode("utf-8"))

          def clean_text(text):
              if not text:
                  return ""
              text = html.unescape(text)
              text = re.sub(r"<[^>]+>", "", text)
              text = re.sub(r"\s+", " ", text).strip()
              return text

          def shorten(text, limit=120):
              if len(text) <= limit:
                  return text
              return text[:limit - 3] + "..."

          def search_news(query, display=5):
              encoded_query = urllib.parse.quote(query)
              url = (
                  "https://openapi.naver.com/v1/search/news.json"
                  f"?query={encoded_query}&display={display}&start=1&sort=date"
              )
              headers = {
                  "X-Naver-Client-Id": NAVER_CLIENT_ID,
                  "X-Naver-Client-Secret": NAVER_CLIENT_SECRET,
              }
              data = request_json(url, headers)
              return data.get("items", [])

          def collect_category_news(category):
              seen_links = set()
              collected = []

              for query in category["queries"]:
                  items = search_news(query, display=4)

                  for item in items:
                      title = clean_text(item.get("title", ""))
                      desc = clean_text(item.get("description", ""))
                      link = item.get("originallink") or item.get("link") or ""

                      if not link or link in seen_links:
                          continue

                      seen_links.add(link)
                      collected.append({
                          "title": title,
                          "desc": shorten(desc, 100),
                          "link": link,
                          "query": query
                      })

                      # 카테고리당 최대 5개만
                      if len(collected) >= 5:
                          return collected

              return collected

          def build_blocks(results_by_category):
              blocks = []

              # 헤더
              blocks.append({
                  "type": "header",
                  "text": {
                      "type": "plain_text",
                      "text": f"📰 오늘의 뉴스 브리핑 | {today_text}"
                  }
              })

              blocks.append({
                  "type": "section",
                  "text": {
                      "type": "mrkdwn",
                      "text": "*게임회사 동향*과 *노동정책* 관련 뉴스를 카테고리별로 정리했어요."
                  }
              })

              blocks.append({"type": "divider"})

              for category in results_by_category:
                  title = f"{category['emoji']} {category['title']}"
                  blocks.append({
                      "type": "section",
                      "text": {
                          "type": "mrkdwn",
                          "text": f"*{title}*"
                      }
                  })

                  if not category["items"]:
                      blocks.append({
                          "type": "section",
                          "text": {
                              "type": "mrkdwn",
                              "text": "관련 뉴스를 찾지 못했어요."
                          }
                      })
                      blocks.append({"type": "divider"})
                      continue

                  for idx, item in enumerate(category["items"], start=1):
                      text = (
                          f"*{idx}. <{item['link']}|{item['title']}>*\n"
                          f"{item['desc']}\n"
                          f"`검색어: {item['query']}`"
                      )
                      blocks.append({
                          "type": "section",
                          "text": {
                              "type": "mrkdwn",
                              "text": text
                          }
                      })

                  blocks.append({"type": "divider"})

              blocks.append({
                  "type": "context",
                  "elements": [
                      {
                          "type": "mrkdwn",
                          "text": "GitHub Actions + Naver Search API 자동 발송"
                      }
                  ]
              })

              return blocks

          results_by_category = []

          for category in CATEGORIES:
              items = collect_category_news(category)
              results_by_category.append({
                  "title": category["title"],
                  "emoji": category["emoji"],
                  "items": items
              })

          # 알림용 fallback 텍스트
          fallback_lines = [f"오늘의 뉴스 브리핑 | {today_text}"]
          for category in results_by_category:
              fallback_lines.append(f"[{category['title']}]")
              if not category["items"]:
                  fallback_lines.append("- 관련 뉴스 없음")
              else:
                  for idx, item in enumerate(category["items"], start=1):
                      fallback_lines.append(f"{idx}. {item['title']} - {item['link']}")
              fallback_lines.append("")
          fallback_text = "\n".join(fallback_lines)

          payload = {
              "channel": SLACK_CHANNEL_ID,
              "text": fallback_text,
              "blocks": build_blocks(results_by_category)
          }

          req = urllib.request.Request(
              "https://slack.com/api/chat.postMessage",
              data=json.dumps(payload).encode("utf-8"),
              headers={
                  "Authorization": f"Bearer {SLACK_BOT_TOKEN}",
                  "Content-Type": "application/json; charset=utf-8"
              },
              method="POST"
          )

          with urllib.request.urlopen(req) as resp:
              result = json.loads(resp.read().decode("utf-8"))

          if not result.get("ok"):
              raise RuntimeError(f"Slack send failed: {result}")

          print("슬랙 전송 성공")
          PY
