name: Naver News to Slack

on:
  workflow_dispatch:
  schedule:
    - cron: "10 1 * * *"

jobs:
  send-news:
    runs-on: ubuntu-latest

    steps:
      - name: Send categorized Naver News to Slack
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: |
          python <<'PY'
          import os
          import re
          import json
          import html
          import urllib.parse
          import urllib.request
          from datetime import datetime, timedelta, timezone

          NAVER_CLIENT_ID = os.environ["NAVER_CLIENT_ID"]
          NAVER_CLIENT_SECRET = os.environ["NAVER_CLIENT_SECRET"]
          SLACK_BOT_TOKEN = os.environ["SLACK_BOT_TOKEN"]
          SLACK_CHANNEL_ID = os.environ["SLACK_CHANNEL_ID"]

          KST = timezone(timedelta(hours=9))
          now_kst = datetime.now(KST)

          target_date = (now_kst - timedelta(days=1)).date()
          report_date_text = target_date.strftime("%Y-%m-%d")

          yesterday_start = datetime.combine(
              target_date,
              datetime.min.time(),
              tzinfo=KST
          )
          yesterday_end = datetime.combine(
              target_date,
              datetime.max.time(),
              tzinfo=KST
          )

          CATEGORIES = [
              {
                  "title": "게임회사 동향",
                  "emoji": "🎮",
                  "queries": [
                      "국내 게임업계 동향",
                      "국내 게임사 전략",
                      "국내 상장 게임사",
                      "넥슨",
                      "넷마블",
                      "엔씨소프트",
                      "크래프톤",
                      "카카오게임즈",
                      "스마일게이트",
                      "네오위즈",
                      "게임빌",
                      "펄어비스",
                      "컴투스",
                      "웹젠",
                      "베이글코드",
                      "시프트업",
                      "데브시스터즈",
                      "미투온",
                      "엠게임",
                      "국내 게임산업 정책",
                      "국내 게임 규제",
                      "게임사 복지"
                  ]
              },
              {
                  "title": "노동정책",
                  "emoji": "⚖️",
                  "queries": [
                      "노동법개정",
                      "노동법 개정",
                      "근로기준법 개정",
                      "고용노동부",
                      "유연근무",
                      "주52시간",
                      "노동 판례",
                      "부당해고",
                      "포괄임금",
                      "IT업계 노동",
                      "게임업계 노동",
                      "육아휴직",
                      "출산휴가",
                      "배우자출산휴가",
                      "난임치료휴가",
                      "가족돌봄휴가",
                      "가족돌봄휴직",
                      "모성보호",
                      "임신기 근로시간 단축",
                      "출산전후휴가"
                  ]
              }
          ]

          def request_json(url, headers=None):
              req = urllib.request.Request(url, headers=headers or {})
              with urllib.request.urlopen(req) as resp:
                  return json.loads(resp.read().decode("utf-8"))

          def clean_text(text):
              if not text:
                  return ""
              text = html.unescape(text)
              text = re.sub(r"<[^>]+>", "", text)
              text = re.sub(r"\s+", " ", text).strip()
              return text

          def shorten(text, limit=100):
              if len(text) <= limit:
                  return text
              return text[:limit - 3] + "..."

          def parse_pubdate(pubdate_str):
              try:
                  dt = datetime.strptime(pubdate_str, "%a, %d %b %Y %H:%M:%S %z")
                  return dt.astimezone(KST)
              except Exception:
                  return None

          def is_target_date(pubdate_str):
              dt = parse_pubdate(pubdate_str)
              if not dt:
                  return False
              return yesterday_start <= dt <= yesterday_end

          def search_news(query, display=50):
              encoded_query = urllib.parse.quote(query)
              url = (
                  "https://openapi.naver.com/v1/search/news.json"
                  f"?query={encoded_query}&display={display}&start=1&sort=date"
              )
              headers = {
                  "X-Naver-Client-Id": NAVER_CLIENT_ID,
                  "X-Naver-Client-Secret": NAVER_CLIENT_SECRET,
              }
              data = request_json(url, headers)
              return data.get("items", [])

          def collect_category_news(category):
              seen_links = set()
              seen_titles = set()
              collected = []

              for query in category["queries"]:
                  items = search_news(query, display=50)

                  for item in items:
                      title = clean_text(item.get("title", ""))
                      desc = clean_text(item.get("description", ""))
                      link = item.get("originallink") or item.get("link") or ""
                      pubdate_str = item.get("pubDate", "")

                      if not title or not link:
                          continue

                      if not is_target_date(pubdate_str):
                          continue

                      normalized_title = re.sub(r"\s+", " ", title).strip()

                      if link in seen_links or normalized_title in seen_titles:
                          continue

                      pub_dt = parse_pubdate(pubdate_str)
                      pub_text = pub_dt.strftime("%Y-%m-%d %H:%M") if pub_dt else ""

                      seen_links.add(link)
                      seen_titles.add(normalized_title)

                      collected.append({
                          "title": title,
                          "desc": shorten(desc, 100),
                          "link": link,
                          "query": query,
                          "pub_text": pub_text
                      })

                      if len(collected) >= 10:
                          return collected

              return collected

          def build_blocks(results_by_category):
              blocks = []

              blocks.append({
                  "type": "header",
                  "text": {
                      "type": "plain_text",
                      "text": f"📰 전날 뉴스 브리핑 | {report_date_text}"
                  }
              })

              blocks.append({
                  "type": "section",
                  "text": {
                      "type": "mrkdwn",
                      "text": f"*{report_date_text} 작성 기사 기준*으로 국내 게임회사 동향과 노동정책 뉴스를 정리했어요."
                  }
              })

              blocks.append({"type": "divider"})

              for category in results_by_category:
                  blocks.append({
                      "type": "section",
                      "text": {
                          "type": "mrkdwn",
                          "text": f"*{category['emoji']} {category['title']}*"
                      }
                  })

                  if not category["items"]:
                      blocks.append({
                          "type": "section",
                          "text": {
                              "type": "mrkdwn",
                              "text": "전날 기준 관련 뉴스를 찾지 못했어요."
                          }
                      })
                      blocks.append({"type": "divider"})
                      continue

                  for idx, item in enumerate(category["items"], start=1):
                      block_text = (
                          f"*{idx}. <{item['link']}|{item['title']}>*\n"
                          f"{item['desc']}\n"
                          f"`작성시각: {item['pub_text']}` | `검색어: {item['query']}`"
                      )
                      blocks.append({
                          "type": "section",
                          "text": {
                              "type": "mrkdwn",
                              "text": block_text
                          }
                      })

                  blocks.append({"type": "divider"})

              blocks.append({
                  "type": "context",
                  "elements": [
                      {
                          "type": "mrkdwn",
                          "text": "GitHub Actions + Naver Search API 자동 발송"
                      }
                  ]
              })

              return blocks

          results_by_category = []

          for category in CATEGORIES:
              items = collect_category_news(category)
              results_by_category.append({
                  "title": category["title"],
                  "emoji": category["emoji"],
                  "items": items
              })

          fallback_lines = [f"전날 뉴스 브리핑 | {report_date_text}"]
          for category in results_by_category:
              fallback_lines.append(f"[{category['title']}]")
              if not category["items"]:
                  fallback_lines.append("- 전날 기준 관련 뉴스 없음")
              else:
                  for idx, item in enumerate(category["items"], start=1):
                      fallback_lines.append(
                          f"{idx}. {item['title']} ({item['pub_text']}) - {item['link']}"
                      )
              fallback_lines.append("")

          fallback_text = "\n".join(fallback_lines)

          payload = {
              "channel": SLACK_CHANNEL_ID,
              "text": fallback_text,
              "blocks": build_blocks(results_by_category)
          }

          req = urllib.request.Request(
              "https://slack.com/api/chat.postMessage",
              data=json.dumps(payload).encode("utf-8"),
              headers={
                  "Authorization": f"Bearer {SLACK_BOT_TOKEN}",
                  "Content-Type": "application/json; charset=utf-8"
              },
              method="POST"
          )

          with urllib.request.urlopen(req) as resp:
              result = json.loads(resp.read().decode("utf-8"))

          if not result.get("ok"):
              raise RuntimeError(f"Slack send failed: {result}")

          print("슬랙 전송 성공")
          PY
