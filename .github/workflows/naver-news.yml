name: Naver News to Slack

on:
  workflow_dispatch:
  schedule:
    - cron: "10 1 * * *"

jobs:
  send-news:
    runs-on: ubuntu-latest

    steps:
      - name: Send categorized Naver News to Slack
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: |
          python <<'PY'
          import os
          import re
          import json
          import html
          import urllib.parse
          import urllib.request
          from datetime import datetime, timedelta, timezone

          NAVER_CLIENT_ID = os.environ["NAVER_CLIENT_ID"]
          NAVER_CLIENT_SECRET = os.environ["NAVER_CLIENT_SECRET"]
          SLACK_BOT_TOKEN = os.environ["SLACK_BOT_TOKEN"]
          SLACK_CHANNEL_ID = os.environ["SLACK_CHANNEL_ID"]

          KST = timezone(timedelta(hours=9))
          now_kst = datetime.now(KST)
          target_date = (now_kst - timedelta(days=1)).date()
          report_date_text = target_date.strftime("%Y-%m-%d")

          target_start = datetime.combine(
              target_date,
              datetime.min.time(),
              tzinfo=KST
          )
          target_end = datetime.combine(
              target_date,
              datetime.max.time(),
              tzinfo=KST
          )

          CATEGORIES = [
              {
                  "title": "게임회사 동향",
                  "emoji": "🎮",
                  "queries": [
                      "국내 게임업계 동향",
                      "국내 게임사 전략",
                      "국내 상장 게임사",
                      "넥슨",
                      "넷마블",
                      "엔씨소프트",
                      "크래프톤",
                      "카카오게임즈",
                      "스마일게이트",
                      "네오위즈",
                      "게임빌",
                      "펄어비스",
                      "컴투스",
                      "웹젠",
                      "베이글코드",
                      "시프트업",
                      "데브시스터즈",
                      "미투온",
                      "엠게임",
                      "국내 게임산업 정책",
                      "국내 게임 규제",
                      "게임사 복지"
                  ],
                  "max_items": None
              },
              {
                  "title": "노동 일반",
                  "emoji": "⚖️",
                  "queries": [
                      "노동법개정",
                      "노동법 개정",
                      "근로기준법 개정",
                      "고용노동부",
                      "유연근무",
                      "주52시간",
                      "노동 판례",
                      "부당해고",
                      "포괄임금",
                      "IT업계 노동",
                      "게임업계 노동"
                  ],
                  "max_items": None
              },
              {
                  "title": "휴직·모성보호",
                  "emoji": "👶",
                  "queries": [
                      "육아휴직",
                      "모성보호",
                      "출산휴가",
                      "배우자출산휴가",
                      "출산전후휴가",
                      "임신기 근로시간 단축",
                      "난임치료휴가",
                      "가족돌봄휴가",
                      "가족돌봄휴직",
                      "휴직"
                  ],
                  "max_items": 5
              }
          ]

          def request_json(url, headers=None):
              req = urllib.request.Request(url, headers=headers or {})
              with urllib.request.urlopen(req) as resp:
                  return json.loads(resp.read().decode("utf-8"))

          def clean_text(text):
              if not text:
                  return ""
              text = html.unescape(text)
              text = re.sub(r"<[^>]+>", "", text)
              text = re.sub(r"\s+", " ", text).strip()
              return text

          def shorten(text, limit=100):
              if len(text) <= limit:
                  return text
              return text[: limit - 3] + "..."

          def normalize_title(text):
              text = clean_text(text).lower()
              text = re.sub(r"[^0-9a-zA-Z가-힣\s]", "", text)
              text = re.sub(r"\s+", " ", text).strip()
              return text

          def parse_pubdate(pubdate_str):
              try:
                  dt = datetime.strptime(pubdate_str, "%a, %d %b %Y %H:%M:%S %z")
                  return dt.astimezone(KST)
              except Exception:
                  return None

          def is_target_date(pubdate_str):
              dt = parse_pubdate(pubdate_str)
              if not dt:
                  return False
              return target_start <= dt <= target_end

          def search_news(query, display=50):
              encoded_query = urllib.parse.quote(query)
              url = (
                  "https://openapi.naver.com/v1/search/news.json"
                  f"?query={encoded_query}&display={display}&start=1&sort=date"
              )
              headers = {
                  "X-Naver-Client-Id": NAVER_CLIENT_ID,
                  "X-Naver-Client-Secret": NAVER_CLIENT_SECRET,
              }
              data = request_json(url, headers)
              return data.get("items", [])

          def collect_category_news(category, global_seen_links, global_seen_titles):
              collected = []

              for query in category["queries"]:
                  items = search_news(query, display=50)

                  for item in items:
                      title = clean_text(item.get("title", ""))
                      desc = clean_text(item.get("description", ""))
                      link = item.get("originallink") or item.get("link") or ""
                      pubdate_str = item.get("pubDate", "")

                      if not title or not link:
                          continue

                      if not is_target_date(pubdate_str):
                          continue

                      normalized_title = normalize_title(title)

                      if link in global_seen_links:
                          continue

                      if normalized_title and normalized_title in global_seen_titles:
                          continue

                      pub_dt = parse_pubdate(pubdate_str)
                      pub_text = pub_dt.strftime("%Y-%m-%d %H:%M") if pub_dt else ""

                      global_seen_links.add(link)
                      if normalized_title:
                          global_seen_titles.add(normalized_title)

                      collected.append({
                          "title": title,
                          "desc": shorten(desc, 100),
                          "link": link,
                          "query": query,
                          "pub_text": pub_text
                      })

                      max_items = category.get("max_items")
                      if max_items is not None and len(collected) >= max_items:
                          return collected

              return collected

          def post_to_slack(payload):
              req = urllib.request.Request(
                  "https://slack.com/api/chat.postMessage",
                  data=json.dumps(payload).encode("utf-8"),
                  headers={
                      "Authorization": f"Bearer {SLACK_BOT_TOKEN}",
                      "Content-Type": "application/json; charset=utf-8"
                  },
                  method="POST"
              )
              with urllib.request.urlopen(req) as resp:
                  result = json.loads(resp.read().decode("utf-8"))

              if not result.get("ok"):
                  raise RuntimeError(f"Slack send failed: {result}")

          def send_header_message(results_by_category):
              summary_lines = [f"전날 뉴스 브리핑 | {report_date_text}"]
              for category in results_by_category:
                  summary_lines.append(f"- {category['title']}: {len(category['items'])}건")

              summary_text = "\n".join(summary_lines)

              blocks = [
                  {
                      "type": "header",
                      "text": {
                          "type": "plain_text",
                          "text": f"📰 전날 뉴스 브리핑 | {report_date_text}"
                      }
                  },
                  {
                      "type": "section",
                      "text": {
                          "type": "mrkdwn",
                          "text": (
                              f"*{report_date_text} 작성 기사 기준*으로 "
                              f"*게임회사 동향*, *노동 일반*, *휴직·모성보호* 뉴스를 정리했어요."
                          )
                      }
                  },
                  {"type": "divider"},
                  {
                      "type": "section",
                      "text": {
                          "type": "mrkdwn",
                          "text": "\n".join(
                              [f"*{c['emoji']} {c['title']}*: {len(c['items'])}건" for c in results_by_category]
                          )
                      }
                  }
              ]

              post_to_slack({
                  "channel": SLACK_CHANNEL_ID,
                  "text": summary_text,
                  "blocks": blocks
              })

          def send_category_messages(category, chunk_size=8):
              items = category["items"]

              if not items:
                  post_to_slack({
                      "channel": SLACK_CHANNEL_ID,
                      "text": f"[{category['title']}] 전날 기준 관련 뉴스 없음",
                      "blocks": [
                          {
                              "type": "section",
                              "text": {
                                  "type": "mrkdwn",
                                  "text": f"*{category['emoji']} {category['title']}*"
                              }
                          },
                          {
                              "type": "section",
                              "text": {
                                  "type": "mrkdwn",
                                  "text": "전날 기준 관련 뉴스를 찾지 못했어요."
                              }
                          }
                      ]
                  })
                  return

              for chunk_index in range(0, len(items), chunk_size):
                  chunk = items[chunk_index: chunk_index + chunk_size]
                  start_no = chunk_index + 1
                  end_no = chunk_index + len(chunk)

                  blocks = [
                      {
                          "type": "section",
                          "text": {
                              "type": "mrkdwn",
                              "text": f"*{category['emoji']} {category['title']}* `{start_no}-{end_no}`"
                          }
                      },
                      {"type": "divider"}
                  ]

                  fallback_lines = [f"[{category['title']}] {start_no}-{end_no}"]

                  for idx, item in enumerate(chunk, start=start_no):
                      block_text = (
                          f"*{idx}. <{item['link']}|{item['title']}>*\n"
                          f"{item['desc']}\n"
                          f"`작성시각: {item['pub_text']}` | `검색어: {item['query']}`"
                      )
                      blocks.append({
                          "type": "section",
                          "text": {
                              "type": "mrkdwn",
                              "text": block_text
                          }
                      })
                      fallback_lines.append(
                          f"{idx}. {item['title']} ({item['pub_text']}) - {item['link']}"
                      )

                  post_to_slack({
                      "channel": SLACK_CHANNEL_ID,
                      "text": "\n".join(fallback_lines),
                      "blocks": blocks
                  })

          global_seen_links = set()
          global_seen_titles = set()
          results_by_category = []

          for category in CATEGORIES:
              items = collect_category_news(category, global_seen_links, global_seen_titles)
              results_by_category.append({
                  "title": category["title"],
                  "emoji": category["emoji"],
                  "items": items
              })

          send_header_message(results_by_category)

          for category in results_by_category:
              if category["title"] == "휴직·모성보호":
                  send_category_messages(category, chunk_size=5)
              else:
                  send_category_messages(category, chunk_size=8)

          print("슬랙 전송 성공")
          PY
